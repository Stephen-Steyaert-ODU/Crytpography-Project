name: Build, Test, and Release Project

on:
    push:
        branches: [main]

    workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/cryptography-course-project
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build runtime image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  target: runtime
                  push: false
                  cache-from: type=gha,scope=runtime
                  cache-to: type=gha,mode=max,scope=runtime

            - name: Build test image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  target: test
                  push: false
                  cache-from: type=gha,scope=test
                  cache-to: type=gha,mode=max,scope=test

    test:
        runs-on: ubuntu-latest
        needs: [build]
        permissions:
            contents: read

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Load test image from cache
              uses: docker/build-push-action@v6
              with:
                  context: .
                  target: test
                  push: false
                  load: true
                  tags: crypto-test:ci
                  cache-from: type=gha,scope=test

            - name: Run tests
              run: docker run --rm crypto-test:ci

    push:
        runs-on: ubuntu-latest
        needs: [test]
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Lowercase image name
              run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> $GITHUB_ENV

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Push runtime image from cache
              uses: docker/build-push-action@v6
              with:
                  context: .
                  target: runtime
                  push: true
                  tags: |
                      ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
                      ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
                  cache-from: type=gha,scope=runtime
